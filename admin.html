<!DOCTYPE html>
<html lang="en">
<head>
  <script src="js/udaya-celebration.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Rotaract Bangalore Warriors</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- HTML2PDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            burgundy: {
              50: '#fdf2f7',
              100: '#fbe4ee',
              200: '#f7cadc',
              300: '#f0a2c2',
              400: '#e36e9c',
              500: '#8B003A', /* Primary Brand Burgundy */
              600: '#78002e', /* Darker accent */
              700: '#5c0022',
              800: '#400018',
              900: '#26000e',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['Poppins', 'sans-serif'],
          },
          boxShadow: {
            premium: '0 8px 30px rgb(0,0,0,0.03)',
            card: '0 10px 40px rgba(0, 0, 0, 0.04)',
            dropdown: '0 10px 30px rgba(0, 0, 0, 0.08)',
          }
        }
      }
    }
  </script>

  <style>
    /* Premium custom styles */
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8fafc;
      overflow-x: hidden;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* Animation effects */
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }
    .animate-pulse-soft {
      animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen">

  <!-- Root element for Preact App -->
  <div id="admin-root"></div>

  <!-- External Libraries for Excel and PDF support -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.6.0/dist/jspdf.plugin.autotable.min.js"></script>

  <!-- Main Preact Script loaded as module -->
  <script type="module" src="js/admin-dashboard.js?v=14"></script>

</body>
</html>
