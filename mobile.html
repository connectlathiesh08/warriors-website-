<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile View Emulator | Rotaract Bangalore Warriors</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@450;600;750&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Outfit', sans-serif;
    }
    
    /* Device Mockup Shadow */
    .phone-shadow {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 0, 58, 0.15);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 overflow-x-hidden">

  <!-- Header Section -->
  <header class="w-full max-w-5xl flex flex-col sm:flex-row items-center justify-between gap-4 py-4 border-b border-slate-800/80 mb-6 shrink-0">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-[#8B003A] to-pink-600 flex items-center justify-center shadow-md">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
      </div>
      <div class="text-left">
        <h1 class="font-display font-extrabold text-lg text-white leading-tight">Mobile View Emulator</h1>
        <p class="text-xs text-slate-400 font-medium">Rotaract Bangalore Warriors Website Previewer</p>
      </div>
    </div>
    
    <!-- Controls Panel -->
    <div class="flex flex-wrap items-center gap-3 bg-slate-900/60 p-2 rounded-2xl border border-slate-800/50 backdrop-blur-md">
      <!-- Page Selector -->
      <div class="flex items-center gap-1.5 px-2">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Page:</span>
        <select id="pageSelect" class="bg-slate-950 border border-slate-800 rounded-lg px-2.5 py-1 text-sm font-semibold text-slate-200 focus:outline-none focus:border-[#8B003A] transition">
          <option value="index.html">Homepage</option>
          <option value="about.html">About Us</option>
          <option value="calendar.html">Calendar</option>
          <option value="donate.html">Donate Page</option>
          <option value="Blog.html">Blog Page</option>
          <option value="admin.html">Admin Portal</option>
          <option value="DistrictCommittee.html">Warriors Council</option>
        </select>
      </div>
      
      <!-- Device Selector -->
      <div class="flex items-center gap-1.5 px-2 border-l border-slate-800">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Device:</span>
        <select id="deviceSelect" class="bg-slate-950 border border-slate-800 rounded-lg px-2.5 py-1 text-sm font-semibold text-slate-200 focus:outline-none focus:border-[#8B003A] transition">
          <option value="390x844">iPhone 15 (390 x 844)</option>
          <option value="412x915">Samsung S23 (412 x 915)</option>
          <option value="360x800">Pixel 8 (360 x 800)</option>
        </select>
      </div>

      <!-- Orientation Toggle -->
      <button id="rotateBtn" class="flex items-center gap-1.5 px-3 py-1 bg-slate-800 hover:bg-[#8B003A] hover:text-white rounded-lg text-xs font-bold text-slate-300 transition" title="Toggle Orientation">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>
        <span>Rotate</span>
      </button>
    </div>
  </header>

  <!-- Interactive Mockup Area -->
  <main class="flex-grow flex items-center justify-center w-full min-h-[500px] py-4 relative">
    
    <!-- Styled Phone Container -->
    <div id="phoneWrapper" class="relative phone-shadow bg-[#1e293b] border-[14px] border-[#0f172a] rounded-[52px] transition-all duration-300 ring-4 ring-slate-800/60" style="width: 390px; height: 844px;">
      
      <!-- Speaker Notch -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-[#0f172a] rounded-b-2xl z-50 flex items-center justify-center">
        <div class="w-12 h-1 bg-slate-800 rounded-full mb-1"></div>
      </div>
      
      <!-- Side Buttons Mockup -->
      <div class="absolute -left-[16px] top-28 w-1 h-14 bg-slate-800 rounded-l-md"></div>
      <div class="absolute -left-[16px] top-48 w-1 h-14 bg-slate-800 rounded-l-md"></div>
      <div class="absolute -right-[16px] top-36 w-1 h-20 bg-slate-800 rounded-r-md"></div>
      
      <!-- Simulated Phone Status Bar -->
      <div id="statusBar" class="absolute top-0 left-0 right-0 h-10 px-6 flex items-center justify-between text-[11px] font-bold text-slate-800 z-40 select-none">
        <span id="phoneTime">09:41</span>
        <div class="flex items-center gap-1.5">
          <!-- Signal Icon -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h20V2z"/></svg>
          <!-- Wifi Icon -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
          <!-- Battery Icon -->
          <div class="w-5 h-2.5 border border-slate-800 rounded-xs p-0.5 flex items-center">
            <div class="h-full bg-slate-800 rounded-2xs w-3/4"></div>
          </div>
        </div>
      </div>
      
      <!-- Web Page Frame -->
      <iframe id="previewIframe" src="index.html" class="w-full h-full border-none rounded-[38px] bg-white pt-10" style="color-scheme: light;"></iframe>
      
      <!-- Bottom home bar -->
      <div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-[#0f172a] rounded-full z-50"></div>
    </div>
    
  </main>

  <!-- Footer Information -->
  <footer class="text-center text-xs text-slate-500 py-4 shrink-0">
    <p>© 2026 Rotaract Bangalore Warriors. Use the device toolbar above to change parameters.</p>
  </footer>

  <!-- Script for Emulator Functionality -->
  <script>
    const iframe = document.getElementById('previewIframe');
    const pageSelect = document.getElementById('pageSelect');
    const deviceSelect = document.getElementById('deviceSelect');
    const rotateBtn = document.getElementById('rotateBtn');
    const phoneWrapper = document.getElementById('phoneWrapper');
    const phoneTime = document.getElementById('phoneTime');
    
    let isLandscape = false;

    // Time auto-updater for mobile status bar
    function updatePhoneTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      hours = hours < 10 ? '0' + hours : hours;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      phoneTime.textContent = `${hours}:${minutes}`;
    }
    setInterval(updatePhoneTime, 1000);
    updatePhoneTime();

    // Change preview page
    pageSelect.addEventListener('change', (e) => {
      iframe.src = e.target.value;
    });

    // Resize device layout
    function applyDimensions() {
      const [widthStr, heightStr] = deviceSelect.value.split('x');
      const width = parseInt(widthStr);
      const height = parseInt(heightStr);

      if (isLandscape) {
        phoneWrapper.style.width = `${height}px`;
        phoneWrapper.style.height = `${width}px`;
        phoneWrapper.style.borderRadius = '52px';
      } else {
        phoneWrapper.style.width = `${width}px`;
        phoneWrapper.style.height = `${height}px`;
        phoneWrapper.style.borderRadius = '52px';
      }
    }

    deviceSelect.addEventListener('change', applyDimensions);

    // Toggle orientation (Rotate Device)
    rotateBtn.addEventListener('click', () => {
      isLandscape = !isLandscape;
      applyDimensions();
    });
  </script>
</body>
</html>
